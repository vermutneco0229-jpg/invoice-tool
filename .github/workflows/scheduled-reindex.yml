name: Weekly Full Reindex

on:
  schedule:
    # Every Sunday at 3:00 AM UTC (12:00 JST)
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  reindex:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: .github/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Reindex all notes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REINDEX_ALL: 'true'
        run: |
          PYTHONPATH=.github/scripts python .github/scripts/process_notes.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes from reindex"
          else
            git commit -m "[bot] 週次リインデックス完了"
            git push
          fi
