name: Generate Documents & Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      note_path:
        description: 'Path to note (or "all" for all publishable notes)'
        required: true
        default: 'all'
      output_format:
        description: 'Output format'
        required: true
        default: 'blog'
        type: choice
        options:
          - blog
          - report
          - manual

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: .github/scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Generate documents
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTE_PATH: ${{ github.event.inputs.note_path }}
          OUTPUT_FORMAT: ${{ github.event.inputs.output_format }}
        run: |
          PYTHONPATH=.github/scripts python .github/scripts/doc_generator.py

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      - name: Build site
        run: |
          if [ -d "docs" ] && [ -f "docs/config.toml" ]; then
            cd docs && hugo --minify
          else
            echo "Hugo site not configured yet. Skipping build."
          fi

      - name: Commit generated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No new documents generated"
          else
            git commit -m "[bot] ドキュメント生成完了"
            git push
          fi

      - name: Deploy to GitHub Pages
        if: hashFiles('docs/public/**') != ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/public
